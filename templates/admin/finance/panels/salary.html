<div class="finance-panel-header">
    <h3><i class="fas fa-calculator"></i> Расчёт зарплат</h3>
    <div class="period-selector">
        <input type="date" id="salaryStartDate" class="form-control">
        <span>—</span>
        <input type="date" id="salaryEndDate" class="form-control">
        <button class="btn btn-primary btn-sm" onclick="FinanceManager.calculateSalary()">Рассчитать</button>

</div>

<div class="salary-report" id="salaryReport">
    <div class="empty-state">Выберите период для расчёта</div>
</div>
