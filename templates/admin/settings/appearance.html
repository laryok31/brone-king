<div class="settings-grid-2col">
    <div class="settings-card">
        <div class="card-header">
            <div class="card-icon"><i class="fas fa-palette"></i></div>
            <div class="card-title">
                <h3>Цветовая схема</h3>
                <p>Выберите тему</p>
            </div>
        </div>
        <div class="card-body">
            <div class="theme-grid">
                <div class="theme-card active" data-theme="default">
                    <div class="theme-preview" style="background: linear-gradient(135deg, #6366f1, #8b5cf6);"></div>
                    <span>Фиолетовая</span>
                </div>
                <div class="theme-card" data-theme="blue">
                    <div class="theme-preview" style="background: linear-gradient(135deg, #3b82f6, #06b6d4);"></div>
                    <span>Синяя</span>
                </div>
                <div class="theme-card" data-theme="green">
                    <div class="theme-preview" style="background: linear-gradient(135deg, #10b981, #34d399);"></div>
                    <span>Зелёная</span>
                </div>
                <div class="theme-card" data-theme="dark">
                    <div class="theme-preview" style="background: linear-gradient(135deg, #1f2937, #4b5563);"></div>
                    <span>Тёмная</span>
                </div>
            </div>
        </div>
    </div>

    <div class="settings-card">
        <div class="card-header">
            <div class="card-icon"><i class="fas fa-eye"></i></div>
            <div class="card-title">
                <h3>Отображение</h3>
                <p>Настройки интерфейса</p>
            </div>
        </div>
        <div class="card-body">
            <div class="setting-item">
                <div class="setting-info"><span>Анимации</span></div>
                <div class="setting-control">
                    <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                </div>
            </div>
            <div class="setting-item">
                <div class="setting-info"><span>Звуки</span></div>
                <div class="setting-control">
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
            </div>
        </div>
    </div>
</div>
